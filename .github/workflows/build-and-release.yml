name: Build and Release

on:
  workflow_dispatch:
    inputs:
      re_ref:
        description: Reviewed UnhideNPCs-RE-Vox commit
        required: false
        default: ba1c2dccfb4fa3c29d6152e8f54bf35e9c9b3752

permissions:
  contents: write

concurrency:
  group: build-and-release
  cancel-in-progress: false

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install MinGW toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y mingw-w64 ninja-build

      - name: Configure git for private fetch
        run: |
          git config --global url."https://${{ secrets.GH_PAT }}:@github.com/".insteadOf "https://github.com/"

      - name: Configure CMake
        run: >
          cmake -S . -B build
          -G Ninja
          -DCMAKE_BUILD_TYPE=RelWithDebInfo
          -DCMAKE_CXX_STANDARD=17
          -DCMAKE_SYSTEM_NAME=Windows
          -DCMAKE_C_COMPILER=x86_64-w64-mingw32-gcc
          -DCMAKE_CXX_COMPILER=x86_64-w64-mingw32-g++
          -DCMAKE_RC_COMPILER=x86_64-w64-mingw32-windres
          -DUNPC_RE_REF=${{ inputs.re_ref }}

      - name: Build
        run: cmake --build build --config RelWithDebInfo

      - name: Read version.txt
        id: version
        run: |
          VERSION=$(cat build/version.txt)
          echo "VERSION=v${VERSION}" >> $GITHUB_OUTPUT

      - name: Create draft GitHub release
        run: |
          gh release create "${{ steps.version.outputs.VERSION }}" \
            ./build/UnhideNPCs.dll \
            ./build/UnhideNPCs.dll.debug \
            --draft \
            --generate-notes \
            --title "${{ steps.version.outputs.VERSION }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
